site_name: AI-Ready Data
site_description: 레거시 조직을 위한 외부 반출 없는 AI-Ready Data 실전 가이드
site_url: https://geniuskey.github.io/AI-Ready-Data/
repo_url: https://github.com/geniuskey/AI-Ready-Data
repo_name: geniuskey/AI-Ready-Data
edit_uri: edit/main/docs/
copyright: 문서 CC BY 4.0 · 코드 MIT

theme:
  name: material
  language: ko
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 어두운 화면으로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 밝은 화면으로 전환
  font: false

nav:
  - 시작하기: index.md
  - 진단과 실행:
      - 준비도 진단: 01-assess/readiness.md
      - 90일 로드맵: 01-assess/90-day-roadmap.md
  - 거버넌스와 보안:
      - 데이터 거버넌스: 02-govern/governance.md
      - 온프레미스 보안: 02-govern/security.md
  - 처음부터 잘 남기기:
      - 문서·회의·의사결정 기록: 03-capture/better-records.md
  - 원천별 플레이북:
      - Office·PDF·Excel: 04-sources/office-spreadsheets.md
      - 이메일: 04-sources/email.md
      - EDM과 SSoT: 04-sources/edm-ssot.md
  - AI 파이프라인:
      - 수집·정제·색인: 05-pipeline/ingestion.md
      - RAG 품질과 운영: 05-pipeline/rag-operations.md
  - 사례:
      - 사례에서 배우기: 06-cases/index.md
      - Rexera 문서 처리: 06-cases/rexera.md
      - Siemens 분산 검색: 06-cases/siemens.md
      - 국내 공공 AI 실증: 06-cases/nia-public-ai.md
      - 한빛제조 90일 전환: 06-cases/hanbit-manufacturing.md
  - 실전 템플릿:
      - 템플릿 안내: templates/index.md
      - 준비도 진단표: templates/readiness-assessment.md
      - 유즈케이스 캔버스: templates/use-case-canvas.md
      - 데이터 원천 인벤토리: templates/source-inventory.md
      - 정보등급·권한표: templates/access-matrix.md
      - AI 친화적 문서 표준: templates/document-standard.md
      - 회의록: templates/meeting-minutes.md
      - 의사결정 로그: templates/decision-log.md
      - 용어사전: templates/glossary-template.md
      - SSoT·충돌대장: templates/ssot-register.md
      - 데이터 품질 점수표: templates/quality-scorecard.md
      - RAG 골든셋: templates/rag-golden-set.md
      - 90일 백로그·RACI: templates/roadmap-raci.md
  - 참고:
      - 참조 아키텍처: reference/architectures.md
      - 용어집: reference/glossary.md
      - 참고문헌: reference/sources.md
      - 기여 가이드: reference/contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ko
        - en

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

# MkDocs 1.6 reserves /templates by default; these negations deliberately
# publish our user-facing worksheet pages from that directory.
exclude_docs: |
  !/templates/
  !/templates/**
